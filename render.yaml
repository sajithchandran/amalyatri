services:
  - type: web
    name: amalyatri-api
    env: node
    region: ohio
    plan: starter
    buildCommand: npm install && npm --workspace=@amalyatri/api run build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: API_PREFIX
        value: api
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: AI_PROVIDER
        value: stub
      - key: STORAGE_PROVIDER
        value: local
      - key: CORS_ORIGINS
        value: https://amalyatri-api.vercel.app
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "120"
      - key: LOG_LEVEL
        value: info
